# Local development stack for ScholarRAG.
#
# Pinecone is a managed cloud service, so it is NOT a container here — the app
# falls back to the in-process LocalVectorStore unless PINECONE_API_KEY is set.
#
# Services: api, postgres, redis, langfuse (LLM tracing), mlflow (experiments).
# The langfuse/mlflow images are sizeable; the first `make up` pulls them.
#
# HOST PORTS are offset from the defaults (api 8001, mlflow 5001, langfuse 3001,
# postgres 5433, redis 6380) so ScholarRAG coexists with other local stacks that
# use the standard ports. Container-internal ports are unchanged, so services
# still reach each other at postgres:5432 / redis:6379 on the compose network.
#
# The secrets below are throwaway LOCAL-DEV values, safe to commit. Never reuse
# them anywhere real.

name: scholarrag

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scholarrag
      POSTGRES_PASSWORD: scholarrag
      POSTGRES_DB: scholarrag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarrag"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      # Optional: falls back to in-code defaults (LocalVectorStore, etc.) if the
      # developer hasn't copied .env.example → .env yet.
      - path: .env
        required: false
    environment:
      # Point the app at the compose services (override .env's localhost DSNs).
      POSTGRES_DSN: postgresql+psycopg://scholarrag:scholarrag@postgres:5432/scholarrag
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    # Same image/env as the API — it just runs the Celery worker instead of
    # uvicorn. Consumes ingestion tasks from Redis and runs the pipeline.
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A scholarrag.workers.celery_app worker -l info --concurrency 2
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DSN: postgresql+psycopg://scholarrag:scholarrag@postgres:5432/scholarrag
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://scholarrag:scholarrag@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: local-dev-nextauth-secret-change-me
      SALT: local-dev-salt-change-me
      # Quoted: unquoted all-digit YAML scalars parse as numbers (64 zeros -> 0).
      ENCRYPTION_KEY: "4ffab59f2094193d9010ed2f11c4241d8aeb5f14cf04e4589efbcbd63ffbf5b6"
      TELEMETRY_ENABLED: "false"

  # Trace backend for OpenTelemetry (Phase 4): stores + displays app traces.
  # UI on http://localhost:16686; ingests OTLP over HTTP on 4318.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4318:4318" # OTLP/HTTP ingest

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    ports:
      - "5001:5000"
    volumes:
      - mlflowdata:/mlflow

volumes:
  pgdata:
  mlflowdata:
